services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: qlass
      POSTGRES_PASSWORD: qlass
      POSTGRES_DB: qlass
    ports:
      - "5432:5432"
    volumes:
      - qlass_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qlass"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles:
      - with-redis

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://qlass:qlass@postgres:5432/qlass?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      STORAGE_PROVIDER: local
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

volumes:
  qlass_pg_data:
